name: Agri-Track CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérifier la qualité du code (Flake8)
        run: |
          flake8 app.py database.py --max-line-length=130 --statistics

      - name: Lancer les tests unitaires (Pytest)
        run: |
          pytest test_app.py -v --tb=short

      - name: Rapport de couverture (optionnel)
        run: |
          pip install pytest-cov
          pytest test_app.py --cov=app --cov-report=term-missing
